version: 2

project_name: minecraft-ping

before:
  hooks:
    - go test ./...

builds:
  - id: minecraft-ping
    main: .
    binary: minecraft-ping
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: release-archives
    ids:
      - minecraft-ping
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ title .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

source:
  enabled: true
  name_template: "{{ .ProjectName }}_{{ .Version }}_source"
  format: tar.gz

signs:
  - id: cosign-keyless
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes
    artifacts: all
    output: true

release:
  draft: false
  prerelease: auto

changelog:
  sort: asc
