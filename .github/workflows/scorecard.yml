name: Scorecard

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "31 5 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  analysis:
    if: github.event.repository.private != true
    name: scorecard
    runs-on: ubuntu-latest
    permissions:
      actions: read # Read workflow metadata used during Scorecard analysis.
      contents: read # Read repository contents for Scorecard checks.
      id-token: write # Mint an OIDC token for Scorecard provenance integration.
      security-events: write # Upload the Scorecard SARIF report to the Security tab.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
