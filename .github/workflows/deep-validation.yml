name: Deep Validation

on:
  schedule:
    - cron: "45 7 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

permissions: {}

env:
  GO_MUTESTING_VERSION: v0.0.0-20251226130216-48d0401f00fb
  GOTOOLCHAIN: auto

jobs:
  deep-fuzz:
    name: deep-fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run fuzz targets
        run: |
          go test . -run=^$ -fuzz=FuzzReadVarIntFromBytes -fuzztime=2m
          go test . -run=^$ -fuzz=FuzzReadStringFromBytes -fuzztime=2m
          go test . -run=^$ -fuzz=FuzzReadPacket -fuzztime=2m

  deep-mutation:
    name: deep-mutation
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache go-mutesting binary
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/go/bin/go-mutesting
          key: go-mutesting-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.GO_MUTESTING_VERSION }}
      - name: Install go-mutesting
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/go-mutesting" ]]; then
            GOTOOLCHAIN="$(go env GOVERSION)" go install "github.com/avito-tech/go-mutesting/cmd/go-mutesting@${GO_MUTESTING_VERSION}"
          fi
      - name: Run full mutation suite
        run: scripts/run_mutation_supported.sh
