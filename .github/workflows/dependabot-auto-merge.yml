---
name: Dependabot Auto-Merge

on:
  # This workflow only uses PR metadata and never checks out or executes PR code.
  # `pull_request_target` is required so Dependabot-triggered runs can read the
  # automerge environment secret that enables downstream workflows after merge.
  pull_request_target:
    branches: ["main"]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  dependabot:
    name: Auto-Merge Dependabot PRs
    runs-on: ubuntu-latest
    environment: automerge
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false
    env:
      PR_URL: ${{ github.event.pull_request.html_url }}
      GH_TOKEN: ${{ secrets.AUTOMERGE_GH_TOKEN }}
    steps:
      - name: Require automerge token
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "AUTOMERGE_GH_TOKEN must be configured so Dependabot merges trigger downstream workflows."
            exit 1
          fi

      - name: Auto-approve Dependabot PR
        run: gh pr review --approve "$PR_URL" || true

      - name: Enable auto-merge for Dependabot PR
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
