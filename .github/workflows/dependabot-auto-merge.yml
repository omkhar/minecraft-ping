---
name: Dependabot Auto-Merge

on:
  workflow_run:
    # zizmor: ignore[dangerous-triggers] This workflow reads PR metadata only and never checks out or executes untrusted code.
    workflows: ["CI"]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  dependabot:
    name: Auto-Merge Dependabot PRs
    runs-on: ubuntu-latest
    environment: automerge
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0].number
    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      PR_URL: ${{ github.event.workflow_run.pull_requests[0].html_url }}
      GH_TOKEN: ${{ secrets.AUTOMERGE_GH_TOKEN }}
    steps:
      - name: Require automerge token
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "AUTOMERGE_GH_TOKEN must be configured so Dependabot merges trigger downstream workflows."
            exit 1
          fi

      - name: Check PR eligibility
        id: eligibility
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          read -r author_login author_is_bot head_ref head_owner is_draft <<EOF
          $(gh pr view "$PR_NUMBER" --json author,isDraft,headRefName,headRepositoryOwner --jq '[.author.login, (.author.is_bot | tostring), .headRefName, .headRepositoryOwner.login, (.isDraft | tostring)] | @tsv')
          EOF

          if [[ "${author_login}" != "app/dependabot" || "${author_is_bot}" != "true" || "${head_ref}" != dependabot/* || "${head_owner}" != "${REPO_OWNER}" || "${is_draft}" == "true" ]]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "eligible=true" >> "$GITHUB_OUTPUT"

      - name: Auto-approve Dependabot PR
        if: steps.eligibility.outputs.eligible == 'true'
        run: gh pr review --approve "$PR_URL" || true

      - name: Enable auto-merge for Dependabot PR
        if: steps.eligibility.outputs.eligible == 'true'
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
