---
name: PR Auto-Merge

on:
  workflow_run:
    # zizmor: ignore[dangerous-triggers] This workflow reads PR metadata only and never checks out or executes untrusted code.
    workflows: ["PR Fast"]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  pr-auto-merge:
    name: Auto-Approve And Merge PRs
    runs-on: ubuntu-latest
    environment: automerge
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0].number
    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      PR_URL: ${{ github.event.workflow_run.pull_requests[0].html_url }}
      GH_TOKEN: ${{ secrets.AUTOMERGE_GH_TOKEN }}
    steps:
      - name: Require automerge token
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "AUTOMERGE_GH_TOKEN must be configured so PR merges trigger downstream workflows."
            exit 1
          fi

      - name: Check PR eligibility
        id: eligibility
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          read -r head_owner is_draft mergeable <<EOF
          $(gh pr view "$PR_NUMBER" --json isDraft,headRepositoryOwner,mergeable --jq '[.headRepositoryOwner.login, (.isDraft | tostring), .mergeable] | @tsv')
          EOF

          if [[ "${head_owner}" != "${REPO_OWNER}" || "${is_draft}" == "true" || "${mergeable}" != "MERGEABLE" ]]; then
            echo "Skipping PR ${PR_NUMBER}: only non-draft, mergeable PRs from branches in ${REPO_OWNER} are auto-approved."
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "eligible=true" >> "$GITHUB_OUTPUT"

      - name: Auto-approve PR
        if: steps.eligibility.outputs.eligible == 'true'
        # Use a distinct bot/PAT if branch protection requires approvals; GitHub will not
        # count a user's self-approval on their own pull request.
        run: gh pr review --approve "$PR_URL" || true

      - name: Enable auto-merge for PR
        if: steps.eligibility.outputs.eligible == 'true'
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
