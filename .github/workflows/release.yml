name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

permissions: {}

env:
  SYFT_VERSION: v1.42.3
  REQUIRED_MAIN_VERIFY_CONTEXTS: ci-agent-smoke,ci-lint,ci-security,ci-test,ci-test-platforms (linux-amd64),ci-test-platforms (linux-arm64),ci-test-platforms (macos-arm64),ci-test-platforms (windows-amd64),ci-test-platforms (windows-arm64),release-snapshot,release-linux-package-smoke (amd64),release-linux-package-smoke (arm64),release-binary-integration (linux-amd64),release-binary-integration (linux-arm64),release-binary-integration (macos-arm64),release-binary-integration (windows-amd64),release-binary-integration (windows-arm64)

jobs:
  release:
    name: Build, Sign, Attest, And Publish Release Assets
    runs-on: ubuntu-latest
    environment: release
    permissions:
      checks: read # Query Main Verify check runs on the tagged main commit before publishing.
      attestations: write # Publish GitHub artifact attestations for the release artifacts.
      artifact-metadata: write # Required by GitHub artifact attestations for file subjects.
      contents: write # Create the GitHub release and upload release assets for the pushed tag.
      id-token: write # Mint the OIDC identity token used for keyless Cosign signing.
    steps:
      - name: Determine GitHub attestation support
        id: attestation_support
        shell: bash
        env:
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
        run: |
          if [[ "${REPOSITORY_PRIVATE}" == "true" && "${OWNER_TYPE}" == "User" ]]; then
            echo "supported=false" >> "${GITHUB_OUTPUT}"
            {
              echo "GitHub artifact attestations are unavailable for user-owned private repositories."
              echo "The release will publish signed artifacts and signed SBOM assets only."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          echo "supported=true" >> "${GITHUB_OUTPUT}"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag and target commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Release workflow must run from a tag ref." >&2
            exit 1
          fi

          git fetch "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main --tags --force

          if ! git rev-parse "${GITHUB_REF_NAME}^{tag}" >/dev/null 2>&1; then
            echo "Release tags must be annotated." >&2
            exit 1
          fi

          tag_object="$(git rev-parse "${GITHUB_REF_NAME}^{tag}")"
          if [[ "$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object}" --jq '.verification.verified')" != "true" ]]; then
            reason="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object}" --jq '.verification.reason')"
            echo "Release tags must have a valid GitHub-verified signature (reason: ${reason})." >&2
            exit 1
          fi

          main_sha="$(git rev-parse origin/main)"
          if [[ "${GITHUB_SHA}" != "${main_sha}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} points at ${GITHUB_SHA}, but origin/main is ${main_sha}." >&2
            echo "Tag the current main head to publish a release." >&2
            exit 1
          fi

      - name: Wait for Main Verify checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/ci_wait_for_checks.sh "${GITHUB_SHA}" 90 "${REQUIRED_MAIN_VERIFY_CONTEXTS}"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v3.0.5

      - name: Install Syft
        shell: bash
        run: |
          arch="$(uname -m)"
          case "${arch}" in
            x86_64) syft_arch=amd64 ;;
            aarch64|arm64) syft_arch=arm64 ;;
            *)
              echo "Unsupported release runner architecture: ${arch}" >&2
              exit 1
              ;;
          esac

          version="${SYFT_VERSION#v}"
          tarball="syft_${version}_linux_${syft_arch}.tar.gz"
          base_url="https://github.com/anchore/syft/releases/download/${SYFT_VERSION}"
          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          curl -fsSL "${base_url}/${tarball}" -o "${workdir}/${tarball}"
          curl -fsSL "${base_url}/syft_${version}_checksums.txt" -o "${workdir}/checksums.txt"
          curl -fsSL "${base_url}/syft_${version}_checksums.txt.pem" -o "${workdir}/checksums.txt.pem"
          curl -fsSL "${base_url}/syft_${version}_checksums.txt.sig" -o "${workdir}/checksums.txt.sig"
          cosign verify-blob "${workdir}/checksums.txt" \
            --certificate "${workdir}/checksums.txt.pem" \
            --signature "${workdir}/checksums.txt.sig" \
            --certificate-identity-regexp '^https://github\.com/anchore/syft/\.github/workflows/.+@refs/heads/main$' \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" >/dev/null
          (
            cd "${workdir}"
            grep " ${tarball}\$" checksums.txt | sha256sum -c -
          )
          tar -xzf "${workdir}/${tarball}" -C "$(go env GOPATH)/bin" syft

      - name: Verify release toolchain
        run: |
          cosign version
          "$(go env GOPATH)/bin/syft" version

      - name: Resolve GoReleaser version
        id: goreleaser_version
        run: echo "value=$(bash scripts/read_goreleaser_version.sh)" >> "$GITHUB_OUTPUT"

      - name: Build, sign, and publish release
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: ${{ steps.goreleaser_version.outputs.value }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub build provenance attestations
        if: steps.attestation_support.outputs.supported == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Verify GitHub build provenance attestations
        if: steps.attestation_support.outputs.supported == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mapfile -t subjects < <(
            find dist -maxdepth 1 -type f -name 'minecraft-ping_*' ! -name '*.sigstore.json' | sort
          )

          if [[ "${#subjects[@]}" -eq 0 ]]; then
            echo "No release artifacts found to verify." >&2
            exit 1
          fi

          for subject in "${subjects[@]}"; do
            gh attestation verify "${subject}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release.yml" \
              --source-ref "${GITHUB_REF}" \
              --deny-self-hosted-runners >/dev/null
          done

      - name: Download GitHub provenance bundles
        if: steps.attestation_support.outputs.supported == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p dist/attestation
          mapfile -t subjects < <(
            find dist -maxdepth 1 -type f -name 'minecraft-ping_*' ! -name '*.sigstore.json' | sort
          )

          if [[ "${#subjects[@]}" -eq 0 ]]; then
            echo "No release artifacts found to download attestations for." >&2
            exit 1
          fi

          for subject in "${subjects[@]}"; do
            digest="$(sha256sum "${subject}" | awk '{print $1}')"
            bundle="sha256:${digest}.jsonl"
            gh attestation download "${subject}" \
              --repo "${GITHUB_REPOSITORY}" \
              --predicate-type "https://slsa.dev/provenance/v1" >/dev/null
            mv "${bundle}" "dist/attestation/$(basename "${subject}").provenance.jsonl"
          done

      - name: Upload GitHub provenance bundle assets
        if: steps.attestation_support.outputs.supported == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s nullglob
          assets=(dist/attestation/*.provenance.jsonl)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No provenance bundles were downloaded." >&2
            exit 1
          fi

          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber

      - name: Generate SPDX SBOMs
        shell: bash
        run: |
          mkdir -p dist/sbom
          mapfile -t subjects < <(
            find dist -maxdepth 1 -type f -name 'minecraft-ping_*' ! -name '*.sigstore.json' | sort
          )

          if [[ "${#subjects[@]}" -eq 0 ]]; then
            echo "No release artifacts found to scan." >&2
            exit 1
          fi

          for subject in "${subjects[@]}"; do
            output="dist/sbom/$(basename "$subject").spdx.json"
            "$(go env GOPATH)/bin/syft" "file:${subject}" -o "spdx-json=${output}"
          done

      - name: Sign SPDX SBOMs
        shell: bash
        run: |
          shopt -s nullglob
          sboms=(dist/sbom/*.spdx.json)
          if [[ "${#sboms[@]}" -eq 0 ]]; then
            echo "No SBOMs were generated." >&2
            exit 1
          fi

          for sbom in "${sboms[@]}"; do
            cosign sign-blob --yes --bundle "${sbom}.sigstore.json" "${sbom}"
          done

      - name: Upload SPDX SBOM assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s nullglob
          assets=(dist/sbom/*.spdx.json dist/sbom/*.spdx.json.sigstore.json)
          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
