name: Mutation Nightly

on:
  schedule:
    - cron: "45 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_MUTESTING_VERSION: v0.0.0-20251226130216-48d0401f00fb
  GOTOOLCHAIN: auto

jobs:
  mutation-nightly:
    name: mutation-nightly
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache go-mutesting binary
        id: go-mutesting-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/go/bin/go-mutesting
          key: go-mutesting-${{ runner.os }}-${{ env.GO_MUTESTING_VERSION }}
      - name: Install go-mutesting
        if: steps.go-mutesting-cache.outputs.cache-hit != 'true'
        run: GOTOOLCHAIN=auto go install github.com/avito-tech/go-mutesting/cmd/go-mutesting@${{ env.GO_MUTESTING_VERSION }}
      - name: Run full mutation suite
        run: |
          "$(go env GOPATH)/bin/go-mutesting" --config .go-mutesting.yml ./...
