name: Mutation Nightly

on:
  schedule:
    - cron: "45 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation-nightly:
    name: mutation-nightly
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install go-mutesting
        run: go install github.com/avito-tech/go-mutesting/cmd/go-mutesting@v0.0.0-20251226130216-48d0401f00fb
      - name: Run full mutation suite
        run: |
          "$(go env GOPATH)/bin/go-mutesting" --config .go-mutesting.yml ./...
