name: Semgrep

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Install Semgrep
        run: python3 -m pip install --disable-pip-version-check semgrep

      - name: Run Semgrep (fail on ERROR severity)
        run: semgrep scan --config p/default --severity ERROR --error --metrics=off --exclude node_modules --exclude target .
