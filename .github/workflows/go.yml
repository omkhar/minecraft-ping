name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  checks: read

env:
  GOVULNCHECK_VERSION: v1.1.4
  GOSEC_VERSION: v2.24.0
  STAGING_USER_AGENT: "Better Uptime Bot Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/74.0.3729.169 Safari/537.36"

jobs:
  ci-security:
    name: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache Go tool binaries
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/go/bin
          key: go-tools-security-${{ env.GOVULNCHECK_VERSION }}-${{ env.GOSEC_VERSION }}
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
      - name: Run govulncheck
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
      - name: Run gosec
        run: |
          "$(go env GOPATH)/bin/gosec" ./...

  ci-build:
    name: ci-build
    needs: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build -v ./...

  deploy-staging:
    name: deploy-staging
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - name: Pull staging-equivalent container image
        run: docker pull itzg/minecraft-server:latest

  ci-test:
    name: ci-test
    needs:
      - ci-build
      - deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test ./...

  staging-smoke:
    name: staging-smoke
    needs: deploy-staging
    runs-on: ubuntu-latest
    env:
      USER_AGENT: "Better Uptime Bot Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/74.0.3729.169 Safari/537.36"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run staging-equivalent smoke
        run: scripts/staging_smoke.sh

  ci-mutation-pr:
    name: ci-mutation-pr
    if: github.event_name == 'pull_request'
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install go-mutesting
        run: GOTOOLCHAIN=auto go install github.com/avito-tech/go-mutesting/cmd/go-mutesting@v0.0.0-20251226130216-48d0401f00fb
      - name: Run diff-scoped mutation tests
        run: scripts/run_mutation_pr.sh

  deploy-production:
    name: deploy-production
    needs:
      - ci-security
      - ci-build
      - ci-test
      - staging-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify required checks by SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/ci_wait_for_checks.sh "${{ github.event.pull_request.head.sha || github.sha }}" 30 "ci-build,ci-test,ci-security"
      - name: Production deploy placeholder
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "No production deployment step defined for minecraft-ping; quality gates passed."
          else
            echo "Not a main push; production deployment skipped."
          fi
