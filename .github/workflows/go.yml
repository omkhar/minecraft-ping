name: Main Verify

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

env:
  ACTIONLINT_VERSION: v1.7.11
  GITLEAKS_VERSION: v8.30.1
  GOCRITIC_VERSION: v0.14.3
  GOIMPORTS_MODULE_VERSION: v0.43.0
  GOVULNCHECK_VERSION: v1.1.4
  GOSEC_VERSION: v2.24.7
  GORELEASER_VERSION: v2.14.3
  INEFFASSIGN_VERSION: v0.2.0
  STATICCHECK_VERSION: v0.7.0
  GOTOOLCHAIN: auto

jobs:
  ci-lint:
    name: ci-lint
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache Go lint tools
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/go/bin
          key: go-tools-lint-${{ runner.os }}-${{ env.ACTIONLINT_VERSION }}-${{ env.STATICCHECK_VERSION }}-${{ env.INEFFASSIGN_VERSION }}-${{ env.GOCRITIC_VERSION }}-${{ env.GOIMPORTS_MODULE_VERSION }}
      - name: Install actionlint
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/actionlint" ]]; then
            go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          fi
      - name: Install staticcheck
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/staticcheck" ]]; then
            GOTOOLCHAIN=auto go install "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}"
          fi
      - name: Install ineffassign
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/ineffassign" ]]; then
            GOTOOLCHAIN=auto go install "github.com/gordonklaus/ineffassign@${INEFFASSIGN_VERSION}"
          fi
      - name: Install goimports
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/goimports" ]]; then
            GOTOOLCHAIN=auto go install "golang.org/x/tools/cmd/goimports@${GOIMPORTS_MODULE_VERSION}"
          fi
      - name: Install gocritic
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/gocritic" ]]; then
            GOTOOLCHAIN=auto go install "github.com/go-critic/go-critic/cmd/gocritic@${GOCRITIC_VERSION}"
          fi
      - name: Verify module downloads
        run: go mod verify
      - name: Run actionlint
        run: '"$(go env GOPATH)/bin/actionlint"'
      - name: Check gofmt
        run: |
          mapfile -t go_files < <(rg --files -g '*.go')
          if [[ "${#go_files[@]}" -eq 0 ]]; then
            exit 0
          fi

          gofmt_out="$(gofmt -l "${go_files[@]}")"
          if [[ -n "${gofmt_out}" ]]; then
            printf '%s\n' "${gofmt_out}"
            exit 1
          fi
      - name: Check goimports
        run: |
          mapfile -t go_files < <(rg --files -g '*.go')
          if [[ "${#go_files[@]}" -eq 0 ]]; then
            exit 0
          fi

          goimports_out="$("$(go env GOPATH)/bin/goimports" -l "${go_files[@]}")"
          if [[ -n "${goimports_out}" ]]; then
            printf '%s\n' "${goimports_out}"
            exit 1
          fi
      - name: Run go vet
        run: go vet ./...
      - name: Run staticcheck
        run: '"$(go env GOPATH)/bin/staticcheck" ./...'
      - name: Run ineffassign
        run: '"$(go env GOPATH)/bin/ineffassign" ./...'
      - name: Run gocritic
        run: '"$(go env GOPATH)/bin/gocritic" check ./...'
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false
          persona: auditor

  ci-security:
    name: ci-security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache Go security tools
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/go/bin
          key: go-tools-security-${{ runner.os }}-${{ env.GOVULNCHECK_VERSION }}-${{ env.GOSEC_VERSION }}-${{ env.GITLEAKS_VERSION }}
      - name: Install govulncheck
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/govulncheck" ]]; then
            go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          fi
      - name: Install gosec
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/gosec" ]]; then
            go install "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}"
          fi
      - name: Install gitleaks
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/gitleaks" ]]; then
            go install "github.com/zricethezav/gitleaks/v8@${GITLEAKS_VERSION}"
          fi
      - name: Run govulncheck
        run: '"$(go env GOPATH)/bin/govulncheck" ./...'
      - name: Run gosec
        run: '"$(go env GOPATH)/bin/gosec" ./...'
      - name: Run gitleaks
        run: '"$(go env GOPATH)/bin/gitleaks" dir . --no-banner --redact --exit-code 1'

  ci-test:
    name: ci-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run race tests
        run: go test -race ./...
      - name: Run shuffled tests
        run: go test -shuffle=on -count=1 ./...

  ci-test-platforms:
    name: ci-test-platforms (${{ matrix.name }})
    needs:
      - ci-lint
      - ci-security
      - ci-test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos-amd64
            runner: macos-15-intel
          - name: macos-arm64
            runner: macos-latest
          - name: windows-amd64
            runner: windows-latest
          - name: windows-arm64
            runner: windows-11-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test ./...

  release-snapshot:
    name: release-snapshot
    needs:
      - ci-lint
      - ci-security
      - ci-test
      - ci-test-platforms
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Build snapshot release artifacts
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --snapshot --clean --skip=sign
      - name: Upload snapshot release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-dist
          path: dist
          retention-days: 1
          compression-level: 0

  release-linux-package-smoke:
    name: release-linux-package-smoke (${{ matrix.arch }})
    needs: release-snapshot
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download snapshot release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Smoke test Linux packages
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
        run: scripts/release_linux_package_smoke.sh dist "$RELEASE_ARCH"

  release-binary-integration:
    name: release-binary-integration (${{ matrix.name }})
    needs: release-snapshot
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            backend: container
            artifact_glob: minecraft-ping_*_Linux_amd64.tar.gz
            binary_name: minecraft-ping
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            backend: container
            artifact_glob: minecraft-ping_*_Linux_arm64.tar.gz
            binary_name: minecraft-ping
          - name: macos-amd64
            runner: macos-15-intel
            backend: binary
            artifact_glob: minecraft-ping_*_Darwin_amd64.tar.gz
            binary_name: minecraft-ping
          - name: macos-arm64
            runner: macos-latest
            backend: binary
            artifact_glob: minecraft-ping_*_Darwin_arm64.tar.gz
            binary_name: minecraft-ping
          - name: windows-amd64
            runner: windows-latest
            backend: binary
            artifact_glob: minecraft-ping_*_Windows_amd64.zip
            binary_name: minecraft-ping.exe
          - name: windows-arm64
            runner: windows-11-arm
            backend: binary
            artifact_glob: minecraft-ping_*_Windows_arm64.zip
            binary_name: minecraft-ping.exe
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Download snapshot release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Build staging backend
        if: matrix.backend == 'binary' && runner.os != 'Windows'
        shell: bash
        run: go build -o "$RUNNER_TEMP/minecraft-staging-server" ./cmd/staging-server
      - name: Build staging backend (Windows)
        if: matrix.backend == 'binary' && runner.os == 'Windows'
        shell: pwsh
        run: go build -o (Join-Path $env:RUNNER_TEMP 'minecraft-staging-server.exe') ./cmd/staging-server
      - name: Build staging container
        if: matrix.backend == 'container'
        run: docker build -f docker/staging-minecraft.Dockerfile -t minecraft-staging-image:ci .
      - name: Run release integration
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_BACKEND: ${{ matrix.backend }}
          RELEASE_ARCHIVE_GLOB: ${{ matrix.artifact_glob }}
          RELEASE_BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          args=(
            -backend "$RELEASE_BACKEND"
            -binary-archive-glob "dist/$RELEASE_ARCHIVE_GLOB"
            -binary-name "$RELEASE_BINARY_NAME"
          )
          if [[ "$RELEASE_BACKEND" == "binary" ]]; then
            args+=(-server-binary "$RUNNER_TEMP/minecraft-staging-server")
          else
            args+=(-image-tag minecraft-staging-image:ci)
          fi
          go run ./cmd/release-integration "${args[@]}"
      - name: Run release integration (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_BACKEND: ${{ matrix.backend }}
          RELEASE_ARCHIVE_GLOB: ${{ matrix.artifact_glob }}
          RELEASE_BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          $args = @(
            '-backend', $env:RELEASE_BACKEND,
            '-binary-archive-glob', "dist/$($env:RELEASE_ARCHIVE_GLOB)",
            '-binary-name', $env:RELEASE_BINARY_NAME,
            '-server-binary', (Join-Path $env:RUNNER_TEMP 'minecraft-staging-server.exe')
          )
          go run ./cmd/release-integration @args
