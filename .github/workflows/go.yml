name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: read # Read check metadata so GitHub surfaces workflow results consistently on pull requests.

env:
  GOVULNCHECK_VERSION: v1.1.4
  GOSEC_VERSION: v2.24.7
  GO_MUTESTING_VERSION: v0.0.0-20251226130216-48d0401f00fb
  GORELEASER_VERSION: v2.14.3
  GOTOOLCHAIN: auto

jobs:
  ci-security:
    name: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache Go tool binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/go/bin
          key: go-tools-security-${{ runner.os }}-${{ env.GOVULNCHECK_VERSION }}-${{ env.GOSEC_VERSION }}
          restore-keys: |
            go-tools-security-${{ runner.os }}-
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@"$GOVULNCHECK_VERSION"
      - name: Run govulncheck
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@"$GOSEC_VERSION"
      - name: Run gosec
        run: |
          "$(go env GOPATH)/bin/gosec" ./...

  ci-build:
    name: ci-build
    needs: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Build
        run: go build -v ./...

  ci-test:
    name: ci-test
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test ./...

  ci-test-platforms:
    name: ci-test-platforms (${{ matrix.name }})
    needs: ci-build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos-amd64
            runner: macos-15-intel
          - name: macos-arm64
            runner: macos-latest
          - name: windows-amd64
            runner: windows-latest
          - name: windows-arm64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test ./...

  release-snapshot:
    name: release-snapshot
    needs:
      - ci-test
      - ci-test-platforms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Build snapshot release artifacts
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --snapshot --clean --skip=sign
      - name: Upload snapshot release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-dist
          path: dist
          retention-days: 1
          compression-level: 0

  release-linux-package-smoke:
    name: release-linux-package-smoke (${{ matrix.arch }})
    needs: release-snapshot
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download snapshot release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Smoke test Linux packages
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
        run: scripts/release_linux_package_smoke.sh dist "$RELEASE_ARCH"

  release-binary-integration:
    name: release-binary-integration (${{ matrix.name }})
    needs: release-snapshot
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            backend: container
            artifact_glob: minecraft-ping_*_Linux_amd64.tar.gz
            binary_name: minecraft-ping
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            backend: container
            artifact_glob: minecraft-ping_*_Linux_arm64.tar.gz
            binary_name: minecraft-ping
          - name: macos-amd64
            runner: macos-15-intel
            backend: binary
            artifact_glob: minecraft-ping_*_Darwin_amd64.tar.gz
            binary_name: minecraft-ping
          - name: macos-arm64
            runner: macos-latest
            backend: binary
            artifact_glob: minecraft-ping_*_Darwin_arm64.tar.gz
            binary_name: minecraft-ping
          - name: windows-amd64
            runner: windows-latest
            backend: binary
            artifact_glob: minecraft-ping_*_Windows_amd64.zip
            binary_name: minecraft-ping.exe
          - name: windows-arm64
            runner: windows-11-arm
            backend: binary
            artifact_glob: minecraft-ping_*_Windows_arm64.zip
            binary_name: minecraft-ping.exe
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Download snapshot release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Build staging backend
        if: matrix.backend == 'binary' && runner.os != 'Windows'
        shell: bash
        run: go build -o "$RUNNER_TEMP/minecraft-staging-server" ./cmd/staging-server
      - name: Build staging backend (Windows)
        if: matrix.backend == 'binary' && runner.os == 'Windows'
        shell: pwsh
        run: go build -o (Join-Path $env:RUNNER_TEMP 'minecraft-staging-server.exe') ./cmd/staging-server
      - name: Build staging container
        if: matrix.backend == 'container'
        run: docker build -f docker/staging-minecraft.Dockerfile -t minecraft-staging-image:ci .
      - name: Run release integration
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_BACKEND: ${{ matrix.backend }}
          RELEASE_ARCHIVE_GLOB: ${{ matrix.artifact_glob }}
          RELEASE_BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          args=(
            -backend "$RELEASE_BACKEND"
            -binary-archive-glob "dist/$RELEASE_ARCHIVE_GLOB"
            -binary-name "$RELEASE_BINARY_NAME"
          )
          if [[ "$RELEASE_BACKEND" == "binary" ]]; then
            args+=(-server-binary "$RUNNER_TEMP/minecraft-staging-server")
          else
            args+=(-image-tag minecraft-staging-image:ci)
          fi
          go run ./cmd/release-integration "${args[@]}"
      - name: Run release integration (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_BACKEND: ${{ matrix.backend }}
          RELEASE_ARCHIVE_GLOB: ${{ matrix.artifact_glob }}
          RELEASE_BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          $args = @(
            '-backend', $env:RELEASE_BACKEND,
            '-binary-archive-glob', "dist/$($env:RELEASE_ARCHIVE_GLOB)",
            '-binary-name', $env:RELEASE_BINARY_NAME,
            '-server-binary', (Join-Path $env:RUNNER_TEMP 'minecraft-staging-server.exe')
          )
          go run ./cmd/release-integration @args

  ci-mutation-pr:
    name: ci-mutation-pr
    if: github.event_name == 'pull_request'
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache go-mutesting binary
        id: go-mutesting-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/go/bin/go-mutesting
          key: go-mutesting-${{ runner.os }}-${{ env.GO_MUTESTING_VERSION }}
      - name: Install go-mutesting
        if: steps.go-mutesting-cache.outputs.cache-hit != 'true'
        run: GOTOOLCHAIN=auto go install github.com/avito-tech/go-mutesting/cmd/go-mutesting@"$GO_MUTESTING_VERSION"
      - name: Run diff-scoped mutation tests
        run: scripts/run_mutation_pr.sh
