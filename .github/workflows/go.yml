name: Main Verify

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

env:
  ACTIONLINT_VERSION: v1.7.11
  CLAUDE_CODE_VERSION: 2.1.114
  CODEX_CLI_VERSION: 0.121.0
  DEADCODE_VERSION: v0.43.0
  GEMINI_CLI_VERSION: 0.38.2
  GITLEAKS_VERSION: v8.30.1
  GOCRITIC_VERSION: v0.14.3
  GOIMPORTS_MODULE_VERSION: v0.43.0
  GOVULNCHECK_VERSION: v1.1.4
  GOSEC_VERSION: v2.24.7
  INEFFASSIGN_VERSION: v0.2.0
  STATICCHECK_VERSION: v0.7.0
  GOTOOLCHAIN: auto

jobs:
  ci-lint:
    name: ci-lint
    runs-on: ubuntu-latest
    permissions:
      actions: read # Read referenced action metadata during workflow auditing.
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache Go lint tools
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/bin
          key: go-tools-lint-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.ACTIONLINT_VERSION }}-${{ env.STATICCHECK_VERSION }}-${{ env.INEFFASSIGN_VERSION }}-${{ env.GOCRITIC_VERSION }}-${{ env.GOIMPORTS_MODULE_VERSION }}-${{ env.DEADCODE_VERSION }}
      - name: Install actionlint
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/actionlint" ]]; then
            GOTOOLCHAIN="$(go env GOVERSION)" go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          fi
      - name: Install staticcheck
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/staticcheck" ]]; then
            GOTOOLCHAIN="$(go env GOVERSION)" go install "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}"
          fi
      - name: Install ineffassign
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/ineffassign" ]]; then
            GOTOOLCHAIN="$(go env GOVERSION)" go install "github.com/gordonklaus/ineffassign@${INEFFASSIGN_VERSION}"
          fi
      - name: Install goimports
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/goimports" ]]; then
            GOTOOLCHAIN="$(go env GOVERSION)" go install "golang.org/x/tools/cmd/goimports@${GOIMPORTS_MODULE_VERSION}"
          fi
      - name: Install gocritic
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/gocritic" ]]; then
            GOTOOLCHAIN="$(go env GOVERSION)" go install "github.com/go-critic/go-critic/cmd/gocritic@${GOCRITIC_VERSION}"
          fi
      - name: Install deadcode
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/deadcode" ]]; then
            GOTOOLCHAIN="$(go env GOVERSION)" go install "golang.org/x/tools/cmd/deadcode@${DEADCODE_VERSION}"
          fi
      - name: Verify module downloads
        run: go mod verify
      - name: Require live agent smoke secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          [[ -n "${OPENAI_API_KEY}" ]] || { echo "OPENAI_API_KEY secret is required for Main Verify agent smoke" >&2; exit 1; }
          [[ -n "${ANTHROPIC_API_KEY}" ]] || { echo "ANTHROPIC_API_KEY secret is required for Main Verify agent smoke" >&2; exit 1; }
          [[ -n "${GEMINI_API_KEY}" ]] || { echo "GEMINI_API_KEY secret is required for Main Verify agent smoke" >&2; exit 1; }
      - name: Install agent CLIs for runtime smoke
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: scripts/install_agent_clis.sh
      - name: Run actionlint
        run: '"$(go env GOPATH)/bin/actionlint"'
      - name: Verify agent surfaces
        env:
          AGENT_SMOKE_REQUIRE_ALL: '1'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: make agents-verify
      - name: Verify public repo surface
        run: make public-verify
      - name: Check gofmt
        run: |
          mapfile -t go_files < <(rg --files -g '*.go')
          if [[ "${#go_files[@]}" -eq 0 ]]; then
            exit 0
          fi

          gofmt_out="$(gofmt -l "${go_files[@]}")"
          if [[ -n "${gofmt_out}" ]]; then
            printf '%s\n' "${gofmt_out}"
            exit 1
          fi
      - name: Check goimports
        run: |
          mapfile -t go_files < <(rg --files -g '*.go')
          if [[ "${#go_files[@]}" -eq 0 ]]; then
            exit 0
          fi

          goimports_out="$("$(go env GOPATH)/bin/goimports" -l "${go_files[@]}")"
          if [[ -n "${goimports_out}" ]]; then
            printf '%s\n' "${goimports_out}"
            exit 1
          fi
      - name: Run go vet
        run: go vet ./...
      - name: Run deadcode
        run: |
          output="$("$(go env GOPATH)/bin/deadcode" -test ./...)"
          if [[ -n "${output}" ]]; then
            printf '%s\n' "${output}"
            exit 1
          fi
      - name: Run staticcheck
        run: '"$(go env GOPATH)/bin/staticcheck" ./...'
      - name: Run ineffassign
        run: '"$(go env GOPATH)/bin/ineffassign" ./...'
      - name: Run gocritic
        run: '"$(go env GOPATH)/bin/gocritic" check ./...'
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false
          persona: auditor

  ci-security:
    name: ci-security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache Go security tools
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/bin
          key: go-tools-security-${{ runner.os }}-${{ hashFiles('go.mod') }}-${{ env.GOVULNCHECK_VERSION }}-${{ env.GOSEC_VERSION }}-${{ env.GITLEAKS_VERSION }}
      - name: Install govulncheck
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/govulncheck" ]]; then
            GOTOOLCHAIN="$(go env GOVERSION)" go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          fi
      - name: Install gosec
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/gosec" ]]; then
            GOTOOLCHAIN="$(go env GOVERSION)" go install "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}"
          fi
      - name: Install gitleaks
        run: |
          if [[ ! -x "$(go env GOPATH)/bin/gitleaks" ]]; then
            go install "github.com/zricethezav/gitleaks/v8@${GITLEAKS_VERSION}"
          fi
      - name: Run govulncheck
        run: '"$(go env GOPATH)/bin/govulncheck" ./...'
      - name: Run gosec
        run: '"$(go env GOPATH)/bin/gosec" ./...'
      - name: Run gitleaks
        run: '"$(go env GOPATH)/bin/gitleaks" dir . --no-banner --redact --exit-code 1'

  ci-test:
    name: ci-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run race tests
        run: go test -race ./...
      - name: Run shuffled tests
        run: go test -shuffle=on -count=1 ./...

  ci-test-platforms:
    name: ci-test-platforms (${{ matrix.name }})
    needs:
      - ci-lint
      - ci-security
      - ci-test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos-amd64
            runner: macos-15-intel
          - name: macos-arm64
            runner: macos-latest
          - name: windows-amd64
            runner: windows-latest
          - name: windows-arm64
            runner: windows-11-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test ./...

  release-snapshot:
    name: release-snapshot
    needs:
      - ci-lint
      - ci-security
      - ci-test
      - ci-test-platforms
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Resolve GoReleaser version
        id: goreleaser_version
        run: echo "value=$(bash scripts/read_goreleaser_version.sh)" >> "$GITHUB_OUTPUT"
      - name: Install GoReleaser CLI
        run: GOTOOLCHAIN="$(go env GOVERSION)" go install "github.com/goreleaser/goreleaser/v2@${{ steps.goreleaser_version.outputs.value }}"
      - name: Build snapshot release artifacts
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: ${{ steps.goreleaser_version.outputs.value }}
          args: release --snapshot --clean --skip=sign
      - name: Smoke test release archives
        run: scripts/release_archive_smoke.sh dist
      - name: Check release reproducibility
        run: scripts/release_reproducibility.sh dist
      - name: Upload snapshot release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: dist
          retention-days: 1
          compression-level: 0

  release-linux-package-smoke:
    name: release-linux-package-smoke (${{ matrix.arch }})
    needs: release-snapshot
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download snapshot release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Smoke test Linux packages
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
        run: scripts/release_linux_package_smoke.sh dist "$RELEASE_ARCH"

  release-binary-integration:
    name: release-binary-integration (${{ matrix.name }})
    needs: release-snapshot
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            backend: container
            artifact_glob: minecraft-ping_*_Linux_amd64.tar.gz
            binary_name: minecraft-ping
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            backend: container
            artifact_glob: minecraft-ping_*_Linux_arm64.tar.gz
            binary_name: minecraft-ping
          - name: macos-amd64
            runner: macos-15-intel
            backend: binary
            artifact_glob: minecraft-ping_*_Darwin_amd64.tar.gz
            binary_name: minecraft-ping
          - name: macos-arm64
            runner: macos-latest
            backend: binary
            artifact_glob: minecraft-ping_*_Darwin_arm64.tar.gz
            binary_name: minecraft-ping
          - name: windows-amd64
            runner: windows-latest
            backend: binary
            artifact_glob: minecraft-ping_*_Windows_amd64.zip
            binary_name: minecraft-ping.exe
          - name: windows-arm64
            runner: windows-11-arm
            backend: binary
            artifact_glob: minecraft-ping_*_Windows_arm64.zip
            binary_name: minecraft-ping.exe
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Download snapshot release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Build staging backend
        if: matrix.backend == 'binary' && runner.os != 'Windows'
        shell: bash
        run: go build -o "$RUNNER_TEMP/minecraft-staging-server" ./cmd/staging-server
      - name: Build staging backend (Windows)
        if: matrix.backend == 'binary' && runner.os == 'Windows'
        shell: pwsh
        run: go build -o (Join-Path $env:RUNNER_TEMP 'minecraft-staging-server.exe') ./cmd/staging-server
      - name: Build staging container
        if: matrix.backend == 'container'
        run: docker build -f docker/staging-minecraft.Dockerfile -t minecraft-staging-image:ci .
      - name: Run release integration
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_BACKEND: ${{ matrix.backend }}
          RELEASE_ARCHIVE_GLOB: ${{ matrix.artifact_glob }}
          RELEASE_BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          args=(
            -backend "$RELEASE_BACKEND"
            -binary-archive-glob "dist/$RELEASE_ARCHIVE_GLOB"
            -binary-name "$RELEASE_BINARY_NAME"
          )
          if [[ "$RELEASE_BACKEND" == "binary" ]]; then
            args+=(-server-binary "$RUNNER_TEMP/minecraft-staging-server")
          else
            args+=(-image-tag minecraft-staging-image:ci)
          fi
          go run ./cmd/release-integration "${args[@]}"
      - name: Run release integration (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_BACKEND: ${{ matrix.backend }}
          RELEASE_ARCHIVE_GLOB: ${{ matrix.artifact_glob }}
          RELEASE_BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          $args = @(
            '-backend', $env:RELEASE_BACKEND,
            '-binary-archive-glob', "dist/$($env:RELEASE_ARCHIVE_GLOB)",
            '-binary-name', $env:RELEASE_BINARY_NAME,
            '-server-binary', (Join-Path $env:RUNNER_TEMP 'minecraft-staging-server.exe')
          )
          go run ./cmd/release-integration @args
