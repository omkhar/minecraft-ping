name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  checks: read

env:
  GOVULNCHECK_VERSION: v1.1.4
  GOSEC_VERSION: v2.24.7
  GO_MUTESTING_VERSION: v0.0.0-20251226130216-48d0401f00fb
  GOTOOLCHAIN: auto

jobs:
  ci-security:
    name: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache Go tool binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/go/bin
          key: go-tools-security-${{ runner.os }}-${{ env.GOVULNCHECK_VERSION }}-${{ env.GOSEC_VERSION }}
          restore-keys: |
            go-tools-security-${{ runner.os }}-
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
      - name: Run govulncheck
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
      - name: Run gosec
        run: |
          "$(go env GOPATH)/bin/gosec" ./...

  ci-build:
    name: ci-build
    needs: ci-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build -v ./...

  deploy-staging:
    name: deploy-staging
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build pinned staging container image
        run: docker build -f docker/staging-minecraft.Dockerfile -t minecraft-staging-image:ci .
      - name: Export staging image artifact
        run: docker save minecraft-staging-image:ci | gzip > minecraft-staging-image.tar.gz
      - name: Upload staging image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: minecraft-staging-image
          path: minecraft-staging-image.tar.gz
          retention-days: 1
          compression-level: 0

  ci-test:
    name: ci-test
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test ./...

  staging-smoke:
    name: staging-smoke
    needs:
      - ci-test
      - deploy-staging
    runs-on: ubuntu-latest
    env:
      USER_AGENT: "Better Uptime Bot Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/74.0.3729.169 Safari/537.36"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Download staging image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: minecraft-staging-image
          path: .
      - name: Load staging image
        run: gunzip -c minecraft-staging-image.tar.gz | docker load

      - name: Run container-backed integration smoke
        env:
          MINECRAFT_STAGING_IMAGE: minecraft-staging-image:ci
        run: scripts/staging_smoke.sh

  ci-mutation-pr:
    name: ci-mutation-pr
    if: github.event_name == 'pull_request'
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache go-mutesting binary
        id: go-mutesting-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/go/bin/go-mutesting
          key: go-mutesting-${{ runner.os }}-${{ env.GO_MUTESTING_VERSION }}
      - name: Install go-mutesting
        if: steps.go-mutesting-cache.outputs.cache-hit != 'true'
        run: GOTOOLCHAIN=auto go install github.com/avito-tech/go-mutesting/cmd/go-mutesting@${{ env.GO_MUTESTING_VERSION }}
      - name: Run diff-scoped mutation tests
        run: scripts/run_mutation_pr.sh
