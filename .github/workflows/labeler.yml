name: Label Pull Requests

on:
  pull_request_target:
    # zizmor: ignore[dangerous-triggers] This workflow applies labels through the GitHub API only and never checks out or executes PR code.
    branches: ["main"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  labeler:
    name: labeler
    runs-on: ubuntu-latest
    permissions:
      contents: read # Read repository metadata and the labeler configuration.
      pull-requests: write # Apply and synchronize labels on the pull request.
    steps:
      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
