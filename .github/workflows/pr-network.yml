name: PR Network

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

env:
  GOTOOLCHAIN: auto

jobs:
  ci-network-pr:
    name: ci-network-pr
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Determine whether dual-stack network validation is required
        id: changes
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin "$GITHUB_BASE_REF" --depth=1
          if git diff --name-only "origin/$GITHUB_BASE_REF...HEAD" | grep -Eq '(^|/).+\.go$|^go\.(mod|sum)$|^docker/|^scripts/run_release_integration\.sh$|^cmd/release-integration/|^cmd/staging-server/|^internal/stagingserver/|^\.github/workflows/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip dual-stack network validation
        if: steps.changes.outputs.run != 'true'
        run: echo "No networking, packaging, or workflow changes detected; skipping PR network validation."
      - name: Set up Go
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build staging container
        if: steps.changes.outputs.run == 'true'
        run: docker build -f docker/staging-minecraft.Dockerfile -t minecraft-staging-image:ci .
      - name: Run dual-stack container integration
        if: steps.changes.outputs.run == 'true'
        env:
          MINECRAFT_RELEASE_INTEGRATION_BACKEND: container
        run: scripts/run_release_integration.sh
