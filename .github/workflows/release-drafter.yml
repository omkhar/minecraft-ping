name: Release Drafter

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  update_release_draft:
    name: release-drafter
    runs-on: ubuntu-latest
    permissions:
      contents: write # Update the draft release contents for the default branch.
      pull-requests: read # Read merged pull request metadata for release note generation.
    steps:
      - uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
